version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - XAI_API_KEY=${XAI_API_KEY}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/xiaobantian
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA=true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16          # ← 改這行，支援 vector extension
    environment:
      POSTGRES_DB: xiaobantian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # ← 初始化 extension
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: