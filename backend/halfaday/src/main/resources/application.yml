spring:
  application:
    name: xiaobantian-platform

  datasource:
    url: jdbc:h2:mem:xiaobantiandb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  ai:
    openai:
      api-key: ${XAI_API_KEY}              # xAI Console 取得的 API Key
      base-url: https://api.x.ai           # ← 改成 xAI endpoint
      chat:
        options:
          model: grok-3                    # ← 改成 Grok 模型
          temperature: 0.7
      embedding:
        options:
          model: v1                        # xAI embedding model

server:
  port: 8080