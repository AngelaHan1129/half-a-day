# ─── DataSource (PostgreSQL) ───────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xiaobantian}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── pgvector ──────────────────────────────────────────────────────────────
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# ─── xAI (Grok) ────────────────────────────────────────────────────────────
spring.ai.openai.api-key=${XAI_API_KEY:}
spring.ai.openai.base-url=https://api.x.ai
spring.ai.openai.chat.options.model=grok-3-mini
spring.ai.openai.embedding.options.model=text-embedding-ada-002

# ─── App ───────────────────────────────────────────────────────────────────
spring.application.name=halfaday
server.port=8080