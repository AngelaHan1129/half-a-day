spring.config.import=optional:file:.env[.properties]

spring.application.name=halfaday
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xiaobantian}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 改成 1024
spring.ai.vectorstore.type=pgvector
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.schema-validation=false

# chat 還是 xAI
spring.ai.openai.api-key=${AI_API_KEY}
spring.ai.openai.base-url=${AI_BASE_URL:https://api.x.ai}
spring.ai.openai.chat.options.model=${AI_CHAT_MODEL:grok-3-mini}

cwa.api.key=${CWA_API_KEY}
cwa.api.base-url=https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001

python.analysis.base-url=${PYTHON_ANALYSIS_BASE_URL:http://localhost:8000}

feature.sound-flower.python-enabled=false

jwt.secret=${JWT_SECRET:dev-secret-change-me}
jwt.expiration=86400000

embedding.service.base-url=http://localhost:8001
embedding.service.enabled=true

logging.level.org.springframework.security=DEBUG